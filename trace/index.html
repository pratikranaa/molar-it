<style>
  html.pricing-off #pricing,html.pricing-off a[href="#pricing"]{display:none!important}
  :root{
    --bg:#f4f1ea; --bg2:#ece7dc; --paper:#fbf9f3; --paper2:#f8f5ec;
    --ink:#15120c; --ink2:#3a3528; --muted:#786e5b; --faint:#a39884;
    --line:#d9d2c2; --line2:#e9e3d4;
    --plum:#8a3556; --plum-deep:#5c1f3a; --plum-soft:#f0dde4; --plum-glow:rgba(138,53,86,.16);
    --ok:#2f5a3a; --warn:#a06b00; --err:#b8542e; --info:#2a4f8c; --cool:#3d4a6a;
    --serif:'Instrument Serif', Georgia, serif;
    --sans:'Geist', ui-sans-serif, system-ui, sans-serif;
    --mono:'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{overflow-x:clip}
  body{font-family:var(--sans); background:var(--bg); color:var(--ink); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
  a{color:inherit; text-decoration:none}
  button{font:inherit;color:inherit}
  ::selection{background:var(--plum-soft); color:var(--plum-deep)}
  .mono{font-family:var(--mono)}
  .serif{font-family:var(--serif); font-weight:400; letter-spacing:-.015em}
  .dim{color:var(--muted)}
  .wrap{max-width:1200px; margin:0 auto; padding:0 32px}
  .eyebrow{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; display:inline-flex; align-items:center; gap:10px}
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--plum); box-shadow:0 0 0 3px var(--plum-glow)}
  .btn{display:inline-flex; align-items:center; gap:8px; padding:11px 18px; border-radius:8px; font-size:14px; font-weight:500; border:1px solid transparent; cursor:pointer; text-decoration:none; transition:background .12s, border-color .12s, color .12s, transform .12s;}
  .btn:hover{transform:translateY(-1px)}
  .btn--primary{background:var(--ink); color:var(--bg); border-color:var(--ink)}
  .btn--primary:hover{background:#000}
  .btn--accent{background:var(--plum); color:#fff; border-color:var(--plum)}
  .btn--accent:hover{background:var(--plum-deep); border-color:var(--plum-deep)}
  .btn--outline{background:transparent; color:var(--ink); border-color:var(--line)}
  .btn--outline:hover{border-color:var(--ink)}
  .btn--ghost{background:transparent; color:var(--ink2)}
  .btn--ghost:hover{background:var(--bg2); color:var(--ink)}
  .btn--xl{padding:14px 22px; font-size:15px; border-radius:9px}

  /* ============ NAV ============ */
  .nav{position:sticky; top:0; z-index:20; background:rgba(244,241,234,.78); backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
  .nav-inner{display:flex; align-items:center; gap:24px; padding:14px 0}
  .nav-brand{display:flex; align-items:center; gap:10px; font-family:var(--serif); font-size:22px}
  .nav-brand .sub{font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-left:6px}
  .nav-links{display:flex; align-items:center; gap:4px; margin-left:18px; flex:1}
  .nav-links a{padding:8px 12px; border-radius:6px; font-size:13px; color:var(--ink2)}
  .nav-links a:hover{background:var(--bg2); color:var(--ink)}
  .nav-suite{display:flex; align-items:center; gap:6px; padding:4px; border:1px solid var(--line); border-radius:99px; background:var(--paper); font-family:var(--mono); font-size:10.5px; color:var(--muted); letter-spacing:.06em}
  .nav-suite a{padding:4px 10px; border-radius:99px; text-transform:uppercase}
  .nav-suite a:hover{background:var(--bg2); color:var(--ink)}
  .nav-suite a.is-on{background:var(--ink); color:var(--bg)}
  .nav-cta{display:flex; gap:8px}

  /* Brand glyph (stacked ribbons + playhead) */
  .glyph{width:24px; height:24px; flex-shrink:0}
  .glyph svg{width:100%; height:100%; display:block}

  /* ============ HERO ============ */
  .hero{position:relative; padding:72px 0 56px; overflow:hidden}
  .hero-bg{position:absolute; inset:0 0 auto 0; height:600px; pointer-events:none; opacity:.4}
  .hero-bg svg{width:100%; height:100%}
  .hero-inner{position:relative}
  .hero-grid{display:grid; grid-template-columns:1.04fr .96fr; gap:56px; align-items:center}
  .hero-copy{min-width:0}
  .hero-visual{min-width:0}
  .hero h1{font-family:var(--serif); font-size:clamp(46px, 4.6vw, 80px); line-height:1.08; letter-spacing:-.025em; margin:22px 0 30px; padding-bottom:.18em; font-weight:400; max-width:13ch; text-wrap:balance;}
  .hero h1 em{font-style:italic; color:var(--plum)}
  .hero-lede{font-size:20px; line-height:1.45; color:var(--ink2); max-width:60ch; margin:0 0 32px}
  .hero-actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .hero-actions .keys{font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:8px}
  .hero-actions .keys kbd{padding:2px 6px; border:1px solid var(--line); border-radius:4px; background:var(--paper); margin:0 2px}
  .hero-stats{display:grid; grid-template-columns:repeat(4, 1fr); gap:32px; margin-top:64px; padding-top:32px; border-top:1px solid var(--line)}
  .hero-stat .v{font-family:var(--serif); font-size:42px; line-height:1; letter-spacing:-.02em}
  .hero-stat .v em{font-style:italic; color:var(--plum)}
  .hero-stat .k{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-top:8px}

  /* hero trace-preview card */
  .htrace{background:var(--paper); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 34px 80px -34px rgba(20,16,8,.34)}
  .htrace-bar{display:flex; align-items:center; gap:8px; padding:15px 18px; background:var(--paper2); border-bottom:1px solid var(--line2); font-family:var(--mono); font-size:11px; color:var(--muted)}
  .htrace-bar .dot-err{color:var(--err)}
  .htrace-bar .right{margin-left:auto; color:var(--err)}
  .htrace-body{position:relative; padding:28px 18px 26px}
  .htrace-grid{display:grid; grid-template-columns:58px 1fr; gap:22px 12px; align-items:center}
  .htrace-lbl{font-family:var(--mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); text-align:right}
  .htrace-trk{position:relative; height:20px; background:var(--bg2); border-radius:4px; overflow:hidden}
  .htrace-trk i{position:absolute; top:0; height:100%; border-radius:1px}
  .htrace-trk .step{background:var(--ink); opacity:.2; border-right:2px solid var(--paper)}
  .htrace-trk .step.cur{background:var(--plum); opacity:.85}
  .htrace-trk .net{background:var(--info)} .htrace-trk .net.fail{background:var(--err)}
  .htrace-trk .dom{background:var(--cool)}
  .htrace-trk .con{background:var(--warn)} .htrace-trk .con.err{background:var(--err)}
  .htrace-trk .agt{background:var(--plum)}
  .htrace-ovl{position:absolute; left:calc(18px + 58px + 12px); right:18px; top:28px; bottom:26px; pointer-events:none}
  .htrace-ph{position:absolute; top:0; bottom:0; left:33%; width:2px; background:var(--plum); z-index:4}
  .htrace-ph::before{content:""; position:absolute; top:-4px; left:-4px; width:10px; height:10px; border-radius:50%; background:var(--plum); box-shadow:0 0 0 4px var(--plum-glow)}
  .htrace-tick{position:absolute; top:-3px; bottom:-3px; left:33%; width:2px; background:var(--err); z-index:3}
  .htrace-tick::after{content:""; position:absolute; top:-5px; left:-3px; width:8px; height:8px; background:var(--err); transform:rotate(45deg)}
  .htrace-foot{display:flex; align-items:center; gap:10px; padding:15px 18px; border-top:1px solid var(--line2); background:var(--paper2); font-family:var(--mono); font-size:10.5px; color:var(--ink2)}
  .htrace-foot .t{color:var(--muted)}
  .htrace-foot .t b{color:var(--ink)}
  .htrace-foot .fail{margin-left:auto; color:var(--err); display:flex; align-items:center; gap:6px}

  /* ============ MARQUEE / LOGOS ============ */
  .marquee{padding:24px 0 0; border-top:1px solid var(--line2); margin-top:64px}
  .marquee-h{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:18px}
  .marquee-row{display:flex; align-items:center; justify-content:space-between; gap:36px; flex-wrap:wrap; opacity:.85}
  .marquee-row .logo{font-family:var(--serif); font-size:24px; letter-spacing:-.01em; color:var(--ink2)}
  .marquee-row .logo small{font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; display:block; margin-top:-4px}

  /* ============ MOTIF SECTION (THE PRODUCT) ============ */
  .product{padding:80px 0 80px; border-top:1px solid var(--line)}
  .product-h{display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:end; margin-bottom:48px}
  .product-h h2{font-family:var(--serif); font-size:clamp(40px, 5vw, 72px); line-height:1.15; letter-spacing:-.02em; margin:14px 0 28px; font-weight:400; max-width:18ch}
  .product-h h2 em{font-style:italic; color:var(--plum)}
  .product-h p{font-size:16px; color:var(--ink2); max-width:54ch; margin:0; line-height:1.55}
  .product-frame{background:var(--paper); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 24px 60px -24px rgba(20,16,8,.22);}
  .pf-bar{display:flex; align-items:center; gap:6px; padding:10px 14px; background:var(--paper2); border-bottom:1px solid var(--line2); font-family:var(--mono); font-size:11px; color:var(--muted);}
  .pf-bar .traffic{display:flex; gap:5px}
  .pf-bar .traffic i{width:10px; height:10px; border-radius:50%; background:var(--line)}
  .pf-bar .url{margin-left:14px}
  .pf-bar .right{margin-left:auto; display:flex; gap:8px}
  .pf-body{display:grid; grid-template-columns:200px 1fr 280px; min-height:480px}
  /* steps */
  .pf-steps{background:var(--paper2); border-right:1px solid var(--line2); padding:14px 12px; font-size:12px}
  .pf-step-h{font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px}
  .pf-step{display:flex; gap:8px; align-items:center; padding:6px 8px; border-radius:6px; cursor:default; color:var(--ink2)}
  .pf-step .i{font-family:var(--mono); font-size:9px; width:18px; color:var(--muted)}
  .pf-step .m{width:12px; height:12px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center}
  .pf-step .m.ok{background:var(--ok); color:#fff}
  .pf-step .m.fail{background:var(--err); color:#fff}
  .pf-step .m.skip{background:var(--bg2); border:1px solid var(--line)}
  .pf-step.on{background:var(--plum-soft); color:var(--plum-deep)}
  .pf-step.on.fail{background:var(--plum); color:#fff}
  .pf-step.on.fail .m.fail{background:#fff; color:var(--plum)}
  .pf-step.on.fail .i{color:rgba(255,255,255,.7)}
  /* viewer */
  .pf-stage{position:relative; background:#15120c; padding:24px; display:flex; align-items:center; justify-content:center}
  .pf-stage-frame{background:#fff; width:100%; max-width:380px; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.4); overflow:hidden;}
  .pf-stage-frame .top{padding:8px 12px; background:#f4f1ea; border-bottom:1px solid #d9d2c2; font-family:var(--mono); font-size:10px; color:#786e5b; text-align:center}
  .pf-stage-frame .body{padding:14px 18px; font-size:11px}
  .pf-stage-frame .body h4{font-family:var(--serif); font-size:18px; margin:0 0 10px; font-weight:400}
  .pf-stage-frame .body .card{border:1px solid #d9d2c2; border-radius:6px; padding:10px 12px; margin-bottom:8px}
  .pf-stage-frame .body .card .lbl{font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:#786e5b}
  .pf-stage-frame .body .card .amt{font-family:var(--serif); font-size:26px; color:var(--err); margin-top:4px}
  .pf-stage-frame .body .note{font-family:var(--mono); font-size:9.5px; color:var(--err); margin-top:4px}
  .pf-stage-frame .body .btn-row{display:flex; gap:6px; margin-top:8px}
  .pf-stage-frame .body .btn-row span{padding:5px 10px; background:#15120c; color:#fff; border-radius:4px; font-size:10px}
  .pf-stage-fail{position:absolute; left:24px; right:24px; bottom:24px; padding:9px 12px; background:rgba(184,84,46,.96); color:#fff; border-radius:8px; font-family:var(--mono); font-size:10.5px; display:flex; gap:8px; align-items:center}
  /* inspector right */
  .pf-insp{border-left:1px solid var(--line2); display:flex; flex-direction:column}
  .pf-insp-tabs{display:flex; border-bottom:1px solid var(--line2); padding:0 10px}
  .pf-insp-tabs button{background:none; border:none; padding:10px 8px; font-size:11px; color:var(--muted); position:relative}
  .pf-insp-tabs button.on{color:var(--ink); font-weight:500}
  .pf-insp-tabs button.on::after{content:""; position:absolute; left:8px; right:8px; bottom:-1px; height:2px; background:var(--plum)}
  .pf-insp-body{padding:12px 14px; flex:1; overflow:hidden; font-family:var(--mono); font-size:10.5px; line-height:1.55}
  .pf-insp-body .h{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 6px}
  .pf-insp-body .row{display:grid; grid-template-columns:54px 1fr; gap:6px; padding:4px 0; border-bottom:1px solid var(--line2); align-items:start; color:var(--ink2)}
  .pf-insp-body .row .ts{color:var(--muted); font-size:9.5px}
  .pf-insp-body .row.now{background:var(--plum-soft); border-bottom-color:var(--plum-soft); color:var(--plum-deep); border-radius:3px; padding:4px 6px; margin:0 -6px}
  .pf-insp-body .row .stat-err{color:var(--err); font-weight:600}
  .pf-insp-tabs button{cursor:pointer}
  .pf-insp-tabs .cnt{background:var(--bg2); color:var(--muted); padding:1px 5px; border-radius:99px; font-size:9px; margin-left:3px}
  .pf-insp-tabs .cnt.on-cnt{background:var(--plum-soft); color:var(--plum-deep)}
  .pf-panel{display:none} .pf-panel.on{display:block}
  .pf-panel .row b{font-weight:600}
  .pf-panel[data-panel="clones"] .row .ts,
  .pf-panel[data-panel="network"] .row .ts{color:var(--cool)}
  .dbg-you{background:var(--bg2); color:var(--ink); padding:7px 10px; border-radius:7px 7px 7px 2px; margin:0 0 8px; max-width:80%; font-family:var(--sans); font-size:11px}
  .dbg-bot{background:var(--plum-soft); color:var(--plum-deep); padding:8px 11px; border-radius:7px 7px 2px 7px; margin:0 0 10px; font-family:var(--sans); font-size:11px; line-height:1.5}
  .dbg-bot code{background:rgba(92,31,58,.1); padding:0 3px; border-radius:3px; font-size:10px}
  .dbg-cta{font-family:var(--mono); font-size:10px; color:var(--plum); border:1px dashed var(--line); border-radius:6px; padding:7px 10px; text-align:center; cursor:pointer}
  .dbg-cta:hover{border-color:var(--plum); background:var(--plum-soft)}
  /* interactive steps + seekable ribbon */
  .pf-step[data-ph]{cursor:pointer}
  .pf-step[data-ph]:hover{background:var(--bg2)}
  .pf-step.is-skip{opacity:.5; cursor:default}
  .pf-rib{cursor:pointer}
  .pf-playhead{transition:left .18s cubic-bezier(.4,0,.2,1)}
  .pf-playhead.seeking{transition:none}
  /* scrubber */
  .pf-scrub{padding:12px 16px; border-top:1px solid var(--line2); background:var(--paper2)}
  .pf-scrub-ctrl{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:10px}
  .pf-scrub-ctrl .play{background:var(--ink); color:var(--paper); border:none; border-radius:6px; padding:5px 12px; display:inline-flex; gap:6px; align-items:center; font-size:11px; font-family:var(--sans)}
  .pf-rib{display:flex; flex-direction:column; gap:4px; position:relative}
  .pf-rib-row{display:flex; align-items:center; gap:8px}
  .pf-rib-row .lbl{width:68px; font-family:var(--mono); font-size:9.5px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase}
  .pf-rib-row .trk{flex:1; height:11px; background:var(--bg2); border-radius:3px; position:relative; overflow:hidden}
  .pf-rib-row .trk i{position:absolute; top:0; height:100%}
  .pf-rib-row .step{background:var(--ink); opacity:.2; border-right:1px solid var(--paper)}
  .pf-rib-row .net{background:var(--info)} .pf-rib-row .net.fail{background:var(--err)}
  .pf-rib-row .dom{background:var(--cool)}
  .pf-rib-row .con{background:var(--warn)} .pf-rib-row .con.err{background:var(--err)}
  .pf-rib-row .agt{background:var(--plum)}
  .pf-playhead{position:absolute; top:0; bottom:0; width:2px; background:var(--plum); z-index:3; pointer-events:none}
  .pf-playhead::before{content:""; position:absolute; top:-3px; left:-4px; width:10px; height:10px; border-radius:50%; background:var(--plum); box-shadow:0 0 0 3px var(--plum-glow)}
  .pf-failtick{position:absolute; top:-4px; bottom:-4px; width:2px; background:var(--err); z-index:2}
  .pf-failtick::after{content:""; position:absolute; top:-6px; left:-3px; width:8px; height:8px; background:var(--err); transform:rotate(45deg)}

  /* ============ COMPARE TO PLAYWRIGHT ============ */
  .vs{padding:80px 0; border-top:1px solid var(--line)}
  .vs-h{display:grid; grid-template-columns:1.3fr 1fr; gap:52px; align-items:end; margin-bottom:40px}
  .vs h2{font-family:var(--serif); font-size:clamp(38px, 5vw, 60px); line-height:1.14; letter-spacing:-.02em; margin:14px 0 0; font-weight:400; max-width:18ch}
  .vs h2 em{font-style:italic; color:var(--plum)}
  .vs-lede{font-size:16px; color:var(--ink2); margin:0; line-height:1.55}
  .vs-table{background:var(--paper); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .vs-table .row{display:grid; grid-template-columns:1.4fr 1fr 1fr; border-top:1px solid var(--line2); align-items:center}
  .vs-table .row:first-child{border-top:none}
  .vs-table .row > div{padding:18px 22px}
  .vs-table .head{background:var(--paper2); font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase}
  .vs-table .head > div:nth-child(2){background:var(--paper); border-left:1px solid var(--line2); border-right:1px solid var(--line2)}
  .vs-table .head > div:nth-child(3){background:var(--plum-soft); color:var(--plum-deep); font-weight:500}
  .vs-table .row > div:nth-child(2){border-left:1px solid var(--line2); border-right:1px solid var(--line2); background:var(--paper)}
  .vs-table .row > div:nth-child(3){background:rgba(138,53,86,.05)}
  .vs-table .feat{font-family:var(--serif); font-size:19px; line-height:1.2; letter-spacing:-.005em}
  .vs-table .feat small{display:block; font-family:var(--sans); font-size:12.5px; color:var(--muted); margin-top:4px; line-height:1.45}
  .vs-table .val{font-size:13.5px; color:var(--ink2); line-height:1.5}
  .vs-table .val.muted{color:var(--muted); font-family:var(--mono); font-size:12px}
  .vs-table .val .ck{display:inline-block; width:14px; height:14px; border-radius:50%; background:var(--plum); color:#fff; text-align:center; line-height:14px; font-size:9px; margin-right:6px; vertical-align:1px}
  .vs-table .val .ex{display:inline-block; width:14px; height:14px; border-radius:50%; background:var(--bg2); color:var(--muted); text-align:center; line-height:14px; font-size:9px; margin-right:6px; vertical-align:1px}

  /* ============ HOW IT WORKS (3-step) ============ */
  .how{padding:88px 0; background:var(--paper); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
  .how-h{text-align:center; margin-bottom:56px}
  .how-h h2{font-family:var(--serif); font-size:clamp(38px, 5vw, 64px); line-height:1.2; letter-spacing:-.02em; font-weight:400; margin:14px 0 26px}
  .how-h h2 em{font-style:italic; color:var(--plum)}
  .how-h p{font-size:16px; color:var(--ink2); max-width:54ch; margin:0 auto}
  .how-row{display:grid; grid-template-columns:repeat(3, 1fr); gap:28px}
  .how-card{background:var(--bg); border:1px solid var(--line); border-radius:14px; padding:28px; display:flex; flex-direction:column; gap:14px; position:relative; min-width:0}
  .how-card .num{font-family:var(--serif); font-size:60px; line-height:1; letter-spacing:-.04em; color:var(--plum); font-style:italic}
  .how-card h3{font-family:var(--serif); font-size:26px; margin:0; font-weight:400; letter-spacing:-.01em; line-height:1.3}
  .how-card p{margin:0; font-size:14px; color:var(--ink2); line-height:1.55}
  .how-card pre{font-family:var(--mono); font-size:11px; padding:12px 14px; background:#15120c; color:#d9d2bf; border-radius:8px; overflow-x:auto; line-height:1.55; margin:auto 0 0; white-space:pre}
  .how-card .ins{color:#86c374} .how-card .kw{color:#e0b145}
  /* step graphics */
  .hc-art{margin-top:auto}
  /* 1 · code editor */
  .hc-editor{border:1px solid var(--line); border-radius:10px; overflow:hidden; background:#17130c; box-shadow:0 14px 32px -18px rgba(20,16,8,.55)}
  .hc-ed-bar{display:flex; align-items:center; gap:9px; padding:9px 12px; background:#231e15; border-bottom:1px solid rgba(255,255,255,.06)}
  .hc-ed-bar .dots{display:flex; gap:5px}
  .hc-ed-bar .dots i{width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.16)}
  .hc-ed-bar .fn{font-family:var(--mono); font-size:10.5px; color:rgba(217,210,191,.6)}
  .hc-ed-bar .fn b{color:#e8e1cd; font-weight:500}
  .hc-ed-body{display:grid; grid-template-columns:auto 1fr; font-family:var(--mono); font-size:11px; line-height:1.7}
  .hc-ed-body .gut{padding:12px 8px 14px 12px; text-align:right; color:rgba(217,210,191,.26); border-right:1px solid rgba(255,255,255,.05); white-space:pre; user-select:none}
  .hc-ed-body .code{padding:12px 14px 14px; color:#d9d2bf; overflow-x:auto; white-space:pre; min-width:0}
  .hc-ed-body .code .kw{color:#e0b145} .hc-ed-body .code .ins{color:#86c374} .hc-ed-body .code .fn2{color:#6db4e0} .hc-ed-body .code .mut{color:rgba(217,210,191,.45)}
  /* 2 · permalink card */
  .hc-link{border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--bg); box-shadow:0 14px 32px -20px rgba(20,16,8,.32)}
  .hc-link-bar{display:flex; align-items:center; gap:8px; padding:9px 11px; background:var(--paper2); border-bottom:1px solid var(--line2)}
  .hc-link-url{flex:1; min-width:0; display:flex; align-items:center; gap:7px; background:var(--bg); border:1px solid var(--line); border-radius:7px; padding:6px 10px; font-family:var(--mono); font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden}
  .hc-link-url .lock{color:var(--ok); flex-shrink:0}
  .hc-link-url .path{color:var(--plum); font-weight:500}
  .hc-link-copy{flex-shrink:0; font-family:var(--mono); font-size:10px; color:var(--ink2); border:1px solid var(--line); border-radius:6px; padding:5px 9px; background:var(--paper)}
  .hc-link-body{padding:13px 14px; display:flex; flex-direction:column; gap:11px}
  .hc-link-status{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:11px; color:var(--ink2)}
  .hc-link-status .ok{width:17px; height:17px; border-radius:50%; background:var(--ok); color:#fff; display:flex; align-items:center; justify-content:center; font-size:9px; flex-shrink:0}
  .hc-link-status b{color:var(--ink); font-weight:600}
  .hc-link-meta{display:flex; gap:7px; flex-wrap:wrap}
  .hc-link-meta span{font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--bg2); border-radius:5px; padding:3px 7px}
  .hc-link-meta span.fail{color:var(--err); background:rgba(184,84,46,.1)}
  /* 3 · debugger chat */
  .hc-chat{border:1px solid var(--line); border-radius:10px; background:var(--bg); padding:12px; display:flex; flex-direction:column; gap:10px; box-shadow:0 14px 32px -20px rgba(20,16,8,.32)}
  .hc-msg{display:flex; gap:8px; align-items:flex-start}
  .hc-msg .av{width:22px; height:22px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:8.5px; font-weight:600; letter-spacing:.02em}
  .hc-msg.you .av{background:var(--bg2); color:var(--ink2)}
  .hc-msg.bot .av{background:var(--plum); color:#fff}
  .hc-msg .bub{font-size:11.5px; line-height:1.5; padding:8px 11px; border-radius:10px; min-width:0}
  .hc-msg.you .bub{background:var(--bg2); color:var(--ink); border-top-left-radius:3px}
  .hc-msg.bot .bub{background:var(--plum-soft); color:var(--plum-deep); border-top-left-radius:3px}
  .hc-msg .bub code{font-family:var(--mono); font-size:10.5px; background:rgba(92,31,58,.12); padding:0 3px; border-radius:3px}
  .hc-msg .bub .seq{font-family:var(--mono); color:var(--plum); font-size:10px}
  .hc-chat-foot{font-family:var(--mono); font-size:10px; color:var(--plum); border:1px dashed var(--line); border-radius:8px; padding:8px; text-align:center}

  /* ============ DOORWAYS (4 tiles) ============ */
  .doors{padding:88px 0; border-top:1px solid var(--line)}
  .doors-h{display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:end; margin-bottom:36px}
  .doors-h h2{font-family:var(--serif); font-size:clamp(38px, 5vw, 64px); line-height:1.15; letter-spacing:-.02em; margin:14px 0 28px; font-weight:400; max-width:18ch}
  .doors-h h2 em{font-style:italic; color:var(--plum)}
  .doors-h p{font-size:16px; color:var(--ink2); max-width:48ch; margin:0; line-height:1.55}
  .doors-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:14px}
  .door{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:22px 22px 24px; display:flex; flex-direction:column; gap:10px; min-height:280px; transition:border-color .12s, transform .12s, box-shadow .12s; cursor:pointer; text-decoration:none; color:inherit}
  .door:hover{border-color:var(--ink); transform:translateY(-2px); box-shadow:0 24px 60px -24px rgba(20,16,8,.22)}
  .door h3{font-family:var(--serif); font-size:22px; margin:0; font-weight:400; letter-spacing:-.01em; line-height:1.3}
  .door p{font-size:13.5px; color:var(--ink2); margin:0; line-height:1.5}
  .door .meta{margin-top:auto; padding-top:12px; border-top:1px dashed var(--line2); font-family:var(--mono); font-size:10.5px; color:var(--muted); display:flex; align-items:center; justify-content:space-between}
  .door .meta .arrow{font-family:var(--mono); font-size:14px}
  .door-ill{height:60px; display:flex; align-items:center; justify-content:flex-start; opacity:.95}
  .door-ill svg{height:54px}

  /* ============ SUITE STRIP ============ */
  .suite{padding:80px 0; background:var(--paper); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
  .suite-h{margin-bottom:36px; max-width:60ch}
  .suite-h h2{font-family:var(--serif); font-size:clamp(38px, 5vw, 64px); line-height:1.2; letter-spacing:-.02em; margin:14px 0 26px; font-weight:400}
  .suite-h h2 em{font-style:italic; color:var(--plum)}
  .suite-h p{font-size:16px; color:var(--ink2); margin:0; line-height:1.55}
  .suite-row{display:grid; grid-template-columns:repeat(4, 1fr); gap:14px}
  .suite-card{background:var(--bg); border:1px solid var(--line); border-radius:14px; padding:24px; display:flex; flex-direction:column; gap:10px; min-height:220px; transition:transform .12s, border-color .12s; cursor:pointer; text-decoration:none; color:inherit}
  .suite-card:hover{transform:translateY(-2px); border-color:var(--ink)}
  .suite-card .name{font-family:var(--serif); font-size:26px; font-weight:400; letter-spacing:-.01em; display:flex; align-items:center; gap:8px}
  .suite-card .name .tag{font-family:var(--mono); font-size:9.5px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; background:var(--bg2); padding:2px 6px; border-radius:3px; font-weight:normal}
  .suite-card .ill{height:48px; display:flex; align-items:center}
  .suite-card .ill svg{height:42px}
  .suite-card p{font-size:13.5px; color:var(--ink2); margin:0; line-height:1.5}
  .suite-card .link{margin-top:auto; font-family:var(--mono); font-size:11px; color:var(--plum); display:flex; align-items:center; gap:4px}
  .suite-card.is-this{border-color:var(--plum); background:linear-gradient(180deg, var(--plum-soft) 0%, var(--bg) 60%)}
  .suite-card.is-this .name .tag{background:var(--plum); color:#fff}

  /* ============ DEEP CAPABILITIES ============ */
  .caps{padding:88px 0; border-top:1px solid var(--line)}
  .caps-h{display:grid; grid-template-columns:1.4fr 1fr; gap:24px; align-items:end; margin-bottom:36px}
  .caps-h h2{font-family:var(--serif); font-size:clamp(38px, 5vw, 64px); line-height:1.15; letter-spacing:-.02em; margin:14px 0 28px; font-weight:400; max-width:20ch}
  .caps-h h2 em{font-style:italic; color:var(--plum)}
  .caps-h p{font-size:16px; color:var(--ink2); max-width:48ch; margin:0; line-height:1.55}
  .caps-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:16px}
  .cap{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:24px 22px 22px; display:flex; flex-direction:column; gap:10px}
  .cap h3{font-family:var(--serif); font-size:22px; line-height:1.3; letter-spacing:-.01em; margin:0; font-weight:400}
  .cap p{font-size:13.5px; color:var(--ink2); margin:0; line-height:1.55}
  .cap .meta{font-family:var(--mono); font-size:10.5px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-top:auto; padding-top:10px}
  .cap .pill{display:inline-block; padding:1px 7px; background:var(--plum-soft); color:var(--plum-deep); border-radius:99px; font-family:var(--mono); font-size:10px; letter-spacing:.04em; margin-right:6px}

  /* ============ INTEGRATIONS ============ */
  .integ{padding:80px 0; background:var(--paper2); border-top:1px solid var(--line)}
  .integ h2{font-family:var(--serif); font-size:clamp(34px, 4vw, 52px); line-height:1.2; letter-spacing:-.02em; font-weight:400; margin:14px 0 22px; max-width:18ch}
  .integ h2 em{font-style:italic; color:var(--plum)}
  .integ .lede{font-size:15.5px; color:var(--ink2); max-width:54ch; margin:0 0 28px}
  .integ-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px}
  .integ-card{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:18px; display:flex; flex-direction:column; gap:6px; min-height:140px}
  .integ-card .name{font-weight:500; font-size:14px; display:flex; align-items:center; gap:8px}
  .integ-card .name .ic{width:24px; height:24px; border-radius:6px; background:var(--bg2); display:flex; align-items:center; justify-content:center; color:var(--ink)}
  .integ-card p{font-size:12.5px; color:var(--muted); margin:0; line-height:1.45}
  .integ-card .tag{margin-top:auto; font-family:var(--mono); font-size:10px; color:var(--plum); letter-spacing:.06em; text-transform:uppercase}

  /* ============ PRICING ============ */
  .price{padding:88px 0; border-top:1px solid var(--line)}
  .price-h{text-align:center; margin-bottom:44px}
  .price-h h2{font-family:var(--serif); font-size:clamp(40px, 5vw, 68px); line-height:1.2; letter-spacing:-.02em; font-weight:400; margin:14px 0 26px}
  .price-h h2 em{font-style:italic; color:var(--plum)}
  .price-h p{font-size:16px; color:var(--ink2); margin:0 auto; max-width:58ch; line-height:1.55}
  .price-row{display:grid; grid-template-columns:repeat(3, 1fr); gap:18px; max-width:1100px; margin:0 auto;}
  .price-card{background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:28px 26px 30px; display:flex; flex-direction:column; gap:14px;}
  .price-card.is-pop{border-color:var(--plum); position:relative; background:linear-gradient(180deg, var(--plum-soft) 0%, var(--paper) 30%)}
  .price-card .ribbon{position:absolute; top:-12px; right:22px; background:var(--plum); color:#fff; padding:4px 12px; border-radius:99px; font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; font-weight:500; white-space:nowrap}
  .price-card .tier{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase}
  .price-card .name{font-family:var(--serif); font-size:32px; margin:0; font-weight:400; letter-spacing:-.01em}
  .price-card .amt{font-family:var(--serif); font-size:54px; line-height:1; letter-spacing:-.025em; display:flex; align-items:baseline; gap:4px; flex-wrap:wrap;}
  .price-card .amt em{font-style:italic; color:var(--plum); font-size:36px}
  .price-card .amt small{font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:6px; font-weight:normal; white-space:nowrap}
  .price-card .blurb{color:var(--ink2); font-size:13.5px; line-height:1.5; margin:0}
  .price-card ul{list-style:none; padding:0; margin:8px 0 0; display:flex; flex-direction:column; gap:8px; font-size:13.5px; color:var(--ink2)}
  .price-card ul li{display:flex; gap:8px; align-items:flex-start; line-height:1.4}
  .price-card ul li::before{content:""; width:14px; height:14px; border-radius:50%; background:var(--plum-soft); color:var(--plum-deep); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:3px; background-image:radial-gradient(circle, var(--plum-deep) 30%, transparent 32%); background-size:6px 6px; background-repeat:no-repeat; background-position:center}
  .price-card .cta{margin-top:auto; padding-top:6px}
  .price-foot{margin-top:36px; text-align:center; font-family:var(--mono); font-size:12px; color:var(--muted)}

  /* ============ FAQ ============ */
  .faq{padding:80px 0; background:var(--paper); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
  .faq-h{text-align:center; margin-bottom:36px}
  .faq-h h2{font-family:var(--serif); font-size:clamp(36px, 4.5vw, 56px); line-height:1.2; letter-spacing:-.02em; font-weight:400; margin:14px 0 6px}
  .faq-h h2 em{font-style:italic; color:var(--plum)}
  .faq-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:14px 28px; max-width:1080px; margin:0 auto}
  .faq-item{border-top:1px solid var(--line2); padding:18px 0}
  .faq-item summary{cursor:pointer; list-style:none; display:flex; justify-content:space-between; align-items:center; gap:14px}
  .faq-item summary::-webkit-details-marker{display:none}
  .faq-item summary .q{font-family:var(--serif); font-size:22px; line-height:1.35; letter-spacing:-.01em}
  .faq-item summary .plus{font-family:var(--mono); font-size:20px; color:var(--muted); transition:transform .15s}
  .faq-item[open] summary .plus{transform:rotate(45deg); color:var(--plum)}
  .faq-item p{font-size:14px; color:var(--ink2); line-height:1.55; margin:10px 0 0; max-width:60ch}
  .faq-item p code{font-family:var(--mono); font-size:12.5px; background:var(--bg2); padding:1px 5px; border-radius:3px}

  /* ============ BIG CTA ============ */
  .bigcta{padding:120px 0 140px; background:var(--ink); color:var(--bg); position:relative; overflow:hidden}
  .bigcta-bg{position:absolute; inset:0; opacity:.25}
  .bigcta-bg svg{width:100%; height:100%}
  .bigcta-inner{position:relative}
  .bigcta-grid{display:grid; grid-template-columns:1.1fr .9fr; gap:60px; align-items:end}
  .bigcta h2{font-family:var(--serif); font-size:clamp(48px, 5.6vw, 88px); line-height:1.08; letter-spacing:-.025em; font-weight:400; margin:0; padding-bottom:.08em; max-width:11ch;}
  .bigcta h2 em{font-style:italic; color:var(--plum-soft); opacity:.95}
  .bigcta p{font-size:18px; color:rgba(244,241,234,.78); max-width:46ch; margin:0 0 28px}
  .bigcta-actions{display:flex; gap:12px; flex-wrap:wrap}
  .bigcta-actions .btn--outline{border-color:rgba(244,241,234,.3); color:var(--bg)}
  .bigcta-actions .btn--outline:hover{border-color:var(--bg)}
  .bigcta-actions .btn--accent{background:var(--plum); border-color:var(--plum)}
  .bigcta-stamp{margin-top:28px; font-family:var(--mono); font-size:11px; color:rgba(244,241,234,.45); letter-spacing:.1em}

  /* ============ FOOTER ============ */
  .footer{background:#0f0c0a; color:var(--bg2); padding:64px 0 24px}
  .footer-top{display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr 1fr; gap:36px; margin-bottom:48px}
  .footer-brand{display:flex; flex-direction:column; gap:16px}
  .footer-wordmark{display:flex; align-items:baseline; gap:8px; font-family:var(--serif); font-size:32px; color:var(--bg)}
  .footer-wordmark .by{font-family:var(--mono); font-size:11px; color:rgba(244,241,234,.5); letter-spacing:.14em; text-transform:uppercase}
  .footer-tagline{font-family:var(--serif); font-style:italic; font-size:18px; color:rgba(244,241,234,.6); max-width:30ch; line-height:1.35}
  .footer-h{font-family:var(--mono); font-size:10.5px; color:rgba(244,241,234,.4); letter-spacing:.12em; text-transform:uppercase; margin:0 0 14px}

<!-- ============ FAQ ============ -->
<section class="faq">
  <div class="wrap">
    <div class="faq-h">
      <div class="eyebrow" style="justify-content:center; display:inline-flex"><span class="dot"></span><span>FAQ</span></div>
      <h2>Honest answers to the <em>real questions</em>.</h2>
      <p style="font-size:15px;color:var(--ink2);max-width:62ch;margin:16px auto 0;line-height:1.55">Also known as: Playwright trace alternative, test replay debugger, forensic CI debugging, Replay.io alternative, flaky test root-cause. See <a href="https://molar.it/vs/playwright">Molar vs Playwright</a>.</p>
    </div>
    <div class="faq-grid">
      <details class="faq-item" open><summary><span class="q">Do I have to use Cartographer or Guard?</span><span class="plus">+</span></summary><p>No. Trace works standalone for any Playwright, Cypress, Selenium, or raw NDJSON source. The other Molar tools are nice to have because they ship traces automatically, but Trace doesn't require them.</p></details>
      <details class="faq-item"><summary><span class="q">How is this different from Sentry / Datadog RUM?</span><span class="plus">+</span></summary><p>Sentry and Datadog watch <em>production</em>. Trace watches <em>your test loop</em>. We don't compete with crash reporters; we sit at the seam between agent-written code and a green CI run. (We do post Trace links into Sentry incidents.)</p></details>
      <details class="faq-item"><summary><span class="q">What's a “Layer 2 replay”?</span><span class="plus">+</span></summary><p>The default trace is the recording (Layer 1). Layer 2 is a re-run: pick a step, restore clone state to that boundary, optionally apply a source or scenario patch, re-execute later steps. You get a new trace and a diff against the original.</p></details>
      <details class="faq-item"><summary><span class="q">How do you handle PII?</span><span class="plus">+</span></summary><p>Per-workspace redaction rules apply at ingest, before NDJSON hits S3. Mask selectors, request headers, query params, and email-shape strings in console logs. Redaction is irreversible. EU residency is one toggle.</p></details>
      <details class="faq-item"><summary><span class="q">Can I export everything?</span><span class="plus">+</span></summary><p>Yes. <code>POST /trace/v1/export</code> bundles your workspace as NDJSON + video + clone snapshots into a single tarball. No lock-in, ever.</p></details>
      <details class="faq-item"><summary><span class="q">What does the Debugger cost?</span><span class="plus">+</span></summary><p>Opus is metered at the model's published rate plus a 10% margin. Haiku (cheap mode) is the same. You can set a monthly cap, a soft cap that flips to cheap mode automatically, and per-user budgets. Bring your own Anthropic key to bypass our markup.</p></details>
      <details class="faq-item"><summary><span class="q">Does Trace replace Playwright Trace Viewer?</span><span class="plus">+</span></summary><p>For agent-era CI: yes, but we don't make you choose. The Playwright trace.zip is one of our supported artifacts. Open it in the local viewer when you're offline; open it here when you want clusters, Debugger, and replay.</p></details>
      <details class="faq-item"><summary><span class="q">Is there an on-prem option?</span><span class="plus">+</span></summary><p>Yes, on Enterprise. We ship a Helm chart that runs ingest, workers, S3-compatible storage, and the Debugger against your own model endpoint.</p></details>
    </div>
  </div>
</section>

<script>
(function(){
  const frame = document.querySelector('.product-frame');
  if(!frame) return;
  const rib = frame.querySelector('.pf-rib');
  const firstTrk = rib.querySelector('.trk');
  const playhead = frame.querySelector('.pf-playhead');
  const failtick = frame.querySelector('.pf-failtick');
  const timeEl = frame.querySelector('.pf-time');
  const playBtn = frame.querySelector('.pf-scrub-ctrl .play');
  const steps = [...frame.querySelectorAll('.pf-step[data-ph]')].map(el=>({el, ph:parseFloat(el.dataset.ph), t:el.dataset.t}));
  const eventRows = [...frame.querySelectorAll('.pf-panel[data-panel="events"] .row')].map(el=>({el, ph:parseFloat(el.dataset.ph)}));
  const tabs = [...frame.querySelectorAll('.pf-insp-tabs button')];
  const panels = [...frame.querySelectorAll('.pf-panel')];
  const stageBody = frame.querySelector('.pf-stage-frame .body');
  const stageTop = frame.querySelector('.pf-stage-frame .top');
  const stageFail = frame.querySelector('.pf-stage-fail');

  const contact = `<div class="card" style="display:flex; gap:14px; padding:8px 12px">
        <div><div class="lbl" style="font-size:9px">Email</div><div style="font-family:var(--mono); font-size:11px">{E}</div></div>
        <div><div class="lbl" style="font-size:9px">Coupon</div><div style="font-family:var(--mono); font-size:11px">{C}</div></div>
      </div>`;
  const C = (e, c) => contact.replace('{E}', e).replace('{C}', c);
  // one stage state per step (idx 0..6 = step 01..07)
  const STAGES = [
    { top:'app.acme.dev / checkout', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Plan</div><div class="amt" style="color:var(--faint)">— select —</div></div>
       ${C('—','—')}
       <div class="btn-row"><span style="opacity:.45">Complete checkout</span></div>` },
    { top:'app.acme.dev / checkout', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Plan</div><div class="amt" style="color:var(--faint)">— select —</div></div>
       ${C('qa+pro@acme.dev','—')}
       <div class="btn-row"><span style="opacity:.45">Complete checkout</span></div>` },
    { top:'app.acme.dev / checkout', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Plan · Pro</div><div class="amt" style="color:var(--ink)">$9.00</div><div class="note" style="color:var(--muted)">billed monthly · per seat</div></div>
       ${C('qa+pro@acme.dev','—')}
       <div class="btn-row"><span>Complete checkout</span></div>` },
    { top:'app.acme.dev / checkout · submitting', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Plan · Pro</div><div class="amt" style="color:var(--ink)">$9.00</div><div class="note" style="color:var(--muted)">billed monthly · per seat</div></div>
       ${C('qa+pro@acme.dev','—')}
       <div class="btn-row"><span style="opacity:.7">● Submitting…</span></div>` },
    { top:'app.acme.dev / checkout', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Quote · total</div><div class="amt" style="color:var(--ok)">$9.00</div><div class="note" style="color:var(--ok)">↳ quote confirmed · tax included</div></div>
       ${C('qa+pro@acme.dev','—')}
       <div class="btn-row"><span>Complete checkout</span></div>` },
    { top:'app.acme.dev / checkout', fail:false, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Total · WELCOME10 applied</div><div class="amt">$90.00</div><div class="note" style="color:var(--warn)">↑ off by 10× · coupon applied as multiplier</div></div>
       ${C('qa+pro@acme.dev','WELCOME10')}
       <div class="btn-row"><span>Complete checkout</span></div>` },
    { top:'app.acme.dev / checkout', fail:true, body:
      `<h4>Checkout</h4>
       <div class="card"><div class="lbl">Total · WELCOME10 applied</div><div class="amt">$90.00</div><div class="note">↑ off by 10× · coupon WELCOME10 applied as multiplier</div></div>
       ${C('qa+pro@acme.dev','WELCOME10')}
       <div class="btn-row"><span>Complete checkout</span></div>` }
  ];
  let lastStage = -1;
  function setStage(idx){
    idx = Math.max(0, Math.min(STAGES.length - 1, idx));
    if(idx === lastStage) return;
    lastStage = idx;
    const s = STAGES[idx];
    stageBody.innerHTML = s.body;
    stageTop.textContent = s.top;
    stageFail.style.display = s.fail ? 'flex' : 'none';
  }
  const END = 15.0;            // run.end ≈ 4.52s
  const DUR = 30.1;            // full timeline seconds
  let cur = 7.9, playing = false, raf = null;

  function geo(){
    const r = firstTrk.getBoundingClientRect();
    const rr = rib.getBoundingClientRect();
    return { left:r.left - rr.left, width:r.width };
  }
  function fmt(pct){ return (Math.max(0,Math.min(pct,100))/100*DUR).toFixed(2)+'s'; }

  function render(pct, label){
    cur = pct;
    const g = geo();
    const px = g.left + Math.max(0,Math.min(pct,100))/100 * g.width;
    playhead.style.left = px + 'px';
    failtick.style.left = (g.left + 7.9/100 * g.width) + 'px';
    timeEl.textContent = label || fmt(pct);
    let act = null;
    steps.forEach(s=>{ if(s.ph <= pct + 0.4) act = s; });
    steps.forEach(s=> s.el.classList.toggle('on', s === act));
    setStage(act ? steps.indexOf(act) : 0);
    let nr = null;
    eventRows.forEach(r=>{ if(r.ph <= pct + 0.05) nr = r; });
    eventRows.forEach(r=> r.el.classList.toggle('now', r === nr));
  }

  function stop(){
    playing = false;
    if(raf) cancelAnimationFrame(raf); raf = null;
    playBtn.textContent = '▶ Play';
    playhead.classList.remove('seeking');
  }
  function play(){
    if(playing){ stop(); return; }
    playing = true;
    playBtn.textContent = '❚❚ Pause';
    playhead.classList.add('seeking');
    const from = cur >= END ? 0 : cur, to = END;
    const dur = 3800 * (to - from) / END;
    let start = null;
    function tick(ts){
      if(!start) start = ts;
      const k = Math.min((ts - start) / dur, 1);
      render(from + (to - from) * k);
      if(k < 1 && playing){ raf = requestAnimationFrame(tick); }
      else { stop(); }
    }
    raf = requestAnimationFrame(tick);
  }

  steps.forEach(s=> s.el.addEventListener('click', ()=>{ stop(); render(s.ph, s.t + 's'); }));
  playBtn.addEventListener('click', play);

  tabs.forEach(b=> b.addEventListener('click', ()=>{
    tabs.forEach(x=> x.classList.toggle('on', x === b));
    panels.forEach(p=> p.classList.toggle('on', p.dataset.panel === b.dataset.tab));
  }));
  const dbgCta = frame.querySelector('.dbg-cta');
  if(dbgCta) dbgCta.addEventListener('click', ()=>{
    tabs.forEach(x=> x.classList.toggle('on', x.dataset.tab === 'debugger'));
    panels.forEach(p=> p.classList.toggle('on', p.dataset.panel === 'debugger'));
  });

  rib.addEventListener('click', e=>{
    if(e.target.closest('.pf-playhead')) return;
    const g = geo(), rr = rib.getBoundingClientRect();
    let pct = (e.clientX - rr.left - g.left) / g.width * 100;
    pct = Math.max(0, Math.min(pct, 100));
    stop();
    playhead.classList.add('seeking');
    render(pct);
    requestAnimationFrame(()=> playhead.classList.remove('seeking'));
  });

  function stepBy(d){
    stop();
    let idx = 0, best = 1e9;
    steps.forEach((s,i)=>{ const dd = Math.abs(s.ph - cur); if(dd < best){ best = dd; idx = i; } });
    idx = Math.max(0, Math.min(steps.length - 1, idx + d));
    render(steps[idx].ph, steps[idx].t + 's');
  }
  let hover = false;
  frame.addEventListener('mouseenter', ()=> hover = true);
  frame.addEventListener('mouseleave', ()=> hover = false);
  document.addEventListener('keydown', e=>{
    if(!hover && !frame.contains(document.activeElement)) return;
    if(e.key === 'j' || e.key === 'J'){ e.preventDefault(); stepBy(1); }
    else if(e.key === 'k' || e.key === 'K'){ e.preventDefault(); stepBy(-1); }
    else if(e.key === ' '){ e.preventDefault(); play(); }
  });
  window.addEventListener('resize', ()=> render(cur));

  render(7.9, '2.38s');
})();
</script>
